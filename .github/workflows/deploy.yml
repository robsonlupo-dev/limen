name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: limen_test
          MYSQL_USER: limen
          MYSQL_PASSWORD: limen_dev_pw
          MYSQL_ROOT_PASSWORD: root_dev_pw
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot_dev_pw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl, redis
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run test suite
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: limen_test
          DB_USERNAME: limen
          DB_PASSWORD: limen_dev_pw
        run: php artisan test

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            cd /var/www/limen
            git config --global --add safe.directory /var/www/limen
            git fetch origin main
            git reset --hard origin/main
            # composer install --no-dev remove os pacotes de dev de vendor/.
            # Se algum arquivo em vendor/ ficou com dono != deploy, o composer
            # não consegue apagá-lo e o deploy quebra. Reassumir a posse antes
            # do install torna o passo idempotente (S1.6).
            sudo chown -R deploy:deploy /var/www/limen/vendor
            composer install --no-dev --optimize-autoloader --no-interaction
            npm ci
            # O npm run build (Vite) reescreve public/build/. Se algum arquivo
            # ali ficou com dono root (build manual no servidor rodado como
            # root), o Vite não consegue sobrescrevê-lo e o build quebra com
            # EACCES. Reassumir a posse antes do build torna o passo idempotente
            # (mesma tática do vendor/ acima, S2.1). O mkdir -p cobre o primeiro
            # deploy, quando public/build/ ainda não existe — roda como deploy
            # (sem sudo: o sudoers só libera chown/supervisorctl sem senha, não
            # mkdir). public/ já pertence ao deploy, então o mkdir não precisa
            # de sudo; o chown -R é NOPASSWD pela regra /bin/chown do sudoers.
            mkdir -p /var/www/limen/public/build
            sudo chown -R deploy:deploy /var/www/limen/public/build
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            sudo chown -R www-data:www-data storage bootstrap/cache
            # Garante o cron do scheduler do Laravel (idempotente). Sem ele o
            # payments:reconcile não roda — e ele é o plano B do crédito de
            # tokens (webhook perdido/inalcançável). O guard evita duplicar a
            # linha em deploys repetidos.
            crontab -l 2>/dev/null | grep -Fq 'artisan schedule:run' || \
              ( crontab -l 2>/dev/null; echo "* * * * * cd /var/www/limen && php artisan schedule:run >> /dev/null 2>&1" ) | crontab -
            sudo supervisorctl restart limen-worker:*
